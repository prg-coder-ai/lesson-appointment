<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>出错啦 - 语言教学预约系统</title>
    <style>
        body {
            background: #f7f7f7;
            color: #444;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .error-container {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px #e0e0e0;
            max-width: 500px;
            width: 94vw;
            padding: 2.5em 2em 2em 2em;
            text-align: center;
        }
        .error-icon {
            font-size: 60px;
            color: #d7263d;
            margin-bottom: 18px;
        }
        .error-type {
            font-size: 1.1em;
            color: #b71c1c;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .error-message {
            color: #8a1153;
            margin-bottom: 25px;
            word-break: break-all;
        }
        .back-btn {
            background: #722ed1;
            color: #fff;
            border: none;
            padding: 8px 32px;
            border-radius: 4px;
            font-size: 1em;
            cursor: pointer;
        }
        .back-btn:hover {
            background: #2d1679;
        }
        .error-detail {
            margin-top: 7px;
            color: #777;
            font-size: 13px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">
            <i class="fa fa-exclamation-triangle"></i>
        </div>
        <div class="error-type">
            [[${status}]] [[${error}]]
        </div>
        <div class="error-message">
            [[${message}]]
        </div>
        <button class="back-btn" onclick="window.history.back();">
            返回上一页
        </button>
        <div class="error-detail" th:if="${timestamp != null}">
            时间：[[${timestamp}]]
        </div>
        <div class="error-detail" th:if="${path != null}">
            路径：[[${path}]]
        </div>
    </div>
    <!-- FontAwesome 本地是否引入可根据具体环境调整 -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</body>
</html>
<!-- 
建议做法如下：

1. Spring Boot全局异常处理（推荐）
在您的Spring Boot项目中添加一个全局异常处理类，捕获错误并返回errorpage视图。

示例（Java代码，需放在controller包下的某个类里）：

@ControllerAdvice
public class GlobalExceptionHandler {
    @ExceptionHandler(Exception.class)
    public String handleError(HttpServletRequest req, Exception ex, Model model) {
        model.addAttribute("status", 500);
        model.addAttribute("error", "服务器内部错误");
        model.addAttribute("message", ex.getMessage());
        model.addAttribute("timestamp", new java.util.Date());
        model.addAttribute("path", req.getRequestURI());
        return "errorpage";
    }
}

2. 配置Spring Boot内置错误页面

application.properties中指定：
```
server.error.whitelabel.enabled=false
server.error.path=/error
```

并新建（或直接用）errorpage.html模板（即本页面）。Spring Boot会自动在发生错误时转发到/templates/errorpage.html。

3. 控制器方法中，可以抛出异常或用重定向：

return "redirect:/error";

总结：
- 推荐使用@ControllerAdvice方式拦截所有异常，集中跳转到errorpage。
- 也可以在Spring Boot中配置错误路径和模板页面名为error（默认就是/error），并用errorpage.html作为Thymeleaf模板。

-->
