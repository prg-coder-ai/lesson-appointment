# ======================== 端口配置（核心，替换为你的非8080端口，示例8088） ========================
server.port=8081 

# ======================== 模板引擎配置（适配HTML+JS动态页面，无需修改） ========================
# Thymeleaf缓存关闭（开发时方便调试，修改页面无需重启项目）
spring.thymeleaf.cache=false
# 动态页面所在目录（对应templates文件夹，固定路径）
spring.thymeleaf.prefix=classpath:/templates/
# 页面后缀（固定为.html，适配你的HTML前端）
spring.thymeleaf.suffix=.html
# 编码格式（避免中文乱码）
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML5

# ======================== 数据库配置（替换为你的数据库信息） ========================
# 数据库URL（MySQL示例，替换IP、端口、数据库名）
spring.datasource.url=jdbc:mysql://localhost:3306/language_reservation??useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=UTC
# 数据库用户名（替换为你的MySQL用户名，如root）
spring.datasource.username=root
# 数据库密码（替换为你的MySQL密码）
spring.datasource.password=123456
# 数据库驱动（MySQL8.0+无需修改，MySQL5.x改为com.mysql.jdbc.Driver）
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ======================== MyBatis配置（若用MyBatis，可选） ========================
# 实体类包路径（替换为你的entity包路径）
mybatis.type-aliases-package=com.reservation.entity
# Mapper.xml文件路径（固定，对应resources/mybatis/mapper文件夹）
mybatis.mapper-locations=classpath:mybatis/mapper/*.xml
# 开启SQL日志（开发时方便调试，可选）
logging.level.com.reservation.mapper=debug

# ======================== 静态资源配置（适配JS/CSS/图片，无需修改） ========================
# 静态资源访问路径（对应static文件夹，页面可直接引用）
spring.mvc.static-path-pattern=/**
spring.web.resources.static-locations=classpath:/static/

# 启用热部署自动重启功能
spring.devtools.restart.enabled=true
# 配置需要监控的代码目录（修改该目录下的Java文件会触发热部署）
spring.devtools.restart.additional-paths=src/main/java
# 排除不需要热部署的目录（静态资源、模板页面无需热部署，修改后刷新浏览器即可生效）
spring.devtools.restart.exclude=static/**,templates/**,public/**
# 热部署检测文件变化的时间间隔（1000ms，可根据需求调整）
spring.devtools.restart.poll-interval=1000ms
# 触发重启前的静默期（400ms，避免频繁修改导致多次重启）
spring.devtools.restart.quiet-period=400ms

 jwt.secret="com_reservation_app"
 jwt.expiration=3600000 
  # 1小时，单位：毫秒