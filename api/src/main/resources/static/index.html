<!DOCTYPE html>
<html lang="zh-CN" , xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>语言教学预约系统 - 统一登录入口</title>
  <!-- 引入公共样式 -->
  <!--- link rel="stylesheet" href="/css/common.css" -->
  <!-- 引入图标库 -->
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* 新增注册弹窗样式（可整合到common.css） */
    .login-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 400px;
      background: #fff;
      border-radius: 8px;
      padding: 24px; 
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    .modal-mask {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      display: none;
    }
    .modal-content {
      width: 90%;
      max-width: 400px;
      background: #fff;
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      border-bottom: 1px solid #eee;
      padding-bottom: 8px;
    }
    .modal-close {
      cursor: pointer;
      font-size: 18px;
      color: #999;
    }
    .modal-close:hover {
      color: #333;
    }
    .register-btn {
      margin-top: 12px;
      text-align: center;
    }
    .register-btn a {
      color: #409eff;
      text-decoration: none;
      font-size: 14px;
    }
    .register-btn a:hover {
      text-decoration: underline;
    }
    .form-item {
      margin-bottom: 16px;
    }
    .form-item label {
      display: block;
      margin-bottom: 4px;
      font-weight: 500;
    }
    .form-item input, .form-item select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
    }
    .error-tip {
      color: #f56c6c;
      font-size: 12px;
      margin-top: 4px;
      display: none;
    }
    .success-tip {
      color: #67c23a;
      font-size: 14px;
      text-align: center;
      margin-top: 12px;
      display: none;
    }
    .btn {
      width: 100%;
      padding: 10px;
      background: #409eff;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    .btn:disabled {
      background: #a0cfff;
      cursor: not-allowed;
    }
    .btn-cancel {
      background: #909399;
      margin-top: 8px;
    }

<body>
  <!-- 登录容器 -->

    <div class="login-header">

      <div class="title">语言教学预约系统</div>
      <div class="subtitle">请登录</div>
    </div>

    <!--class="modal-content"  登录表单 -->
    <form class="modal-content"  id="login-form">

      <div class="form-item">
        <label for="username">账号(Email or Phone)</label>
        <input type="text" id="username" placeholder="请输入账号" required>

      </div>

      <button type="submit" class="btn" id="login-btn">
        <span id="btn-text">登录系统</span>
      </button>
      <!-- 【修改】新增 display: none 隐藏初始错误提示 -->
      <div class="error-tip" id="login-error" style="text-align: center; margin-top: 16px; display: none;">账号或密码错误，请重试</div>

      <!-- 新增注册按钮 -->

  <!-- 新增注册弹窗 -->
  <div class="modal-mask" id="register-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>用户注册</h3>
        <span class="modal-close" id="close-modal"><i class="fa fa-times"></i></span>
      </div>
      <form id="register-form">
        <div class="form-item">
          <label for="register-role">注册身份</label>
          <select id="register-role" required>
            <option value="">请选择身份</option>
            <option value="teacher">教师</option>
            <option value="student">学生</option>
          </select>
          <div class="error-tip" id="register-role-error">请选择注册身份</div>
        </div>
        <div class="form-item">
          <label for="register-username">账号(邮箱或电话号码)</label>
          <input type="text" id="register-username" placeholder="请设置账号（字母/数字）" required>

        </div>
        <div class="form-item">
          <label for="register-name">真实姓名</label>
          <input type="text" id="register-name" placeholder="请输入真实姓名" required>

        </div>

          <input type="password" id="register-password" placeholder="请设置密码" required>

  <!-- JavaScript核心逻辑 -->
  <script>
    const API_SERVER_HOST = 'http://localhost';
     const API_SERVER_PORT = '8081';
    const API_BASE_PATH = '';
    //'/api/v1';

    // API完整前缀
    const API_BASE_URL = `${API_SERVER_HOST}:${API_SERVER_PORT}${API_BASE_PATH}`;
    // DOM元素获取（登录相关）
    const loginForm = document.getElementById('login-form');
    //const userRole = document.getElementById('user-role');
    const username = document.getElementById('username');
    const password = document.getElementById('password');
    const loginBtn = document.getElementById('login-btn');
    const btnText = document.getElementById('btn-text');
    
    // 错误提示元素（登录）
   // const roleError = document.getElementById('role-error');
    const usernameError = document.getElementById('username-error');
    const passwordError = document.getElementById('password-error');
    const loginError = document.getElementById('login-error');

    // 新增：注册相关DOM元素
    const registerModal = document.getElementById('register-modal');
    const showRegister = document.getElementById('show-register');
    const closeModal = document.getElementById('close-modal');
    const cancelRegister = document.getElementById('cancel-register');
    const registerForm = document.getElementById('register-form');
    const registerRole = document.getElementById('register-role');
    const registerUsername = document.getElementById('register-username');
    const registerName = document.getElementById('register-name');

     var   registerEmail ="";// document.getElementById('register-email');
     var   registerPhone =""; //document.getElementById('register-phone');
      var registerAccount="";
    const registerPassword = document.getElementById('register-password');
    const registerConfirmPwd = document.getElementById('register-confirm-pwd');
    const registerBtn = document.getElementById('register-btn');
    
    // 注册错误/成功提示
    const registerRoleError = document.getElementById('register-role-error');
    const registerUsernameError = document.getElementById('register-username-error');
    const registerNameError = document.getElementById('register-name-error');
    // const registerEmailError = document.getElementById('register-email-error');
    // const registerPhoneError = document.getElementById('register-phone-error');
    const registerPasswordError = document.getElementById('register-password-error');
    const registerConfirmError = document.getElementById('register-confirm-error');
    const registerSuccess = document.getElementById('register-success');
    const registerError = document.getElementById('register-error');

    // 表单验证函数（登录）
    function validateForm() {
      let isValid = true;
      
      // 重置所有错误提示
      //roleError.style.display = 'none';
      usernameError.style.display = 'none';
      passwordError.style.display = 'none';
      loginError.style.display = 'none';

      // 验证身份选择
    //  if (!userRole.value) {
    //    roleError.style.display = 'block';
    //    isValid = false;
     // }

      // 验证账号
      if (!username.value.trim()) {
        usernameError.style.display = 'block';
        isValid = false;
      }
   
      // 验证密码
      if (!password.value.trim()) {
        passwordError.style.display = 'block';
        isValid = false;
      }

      return isValid;
    }

    // 新增：注册表单验证函数
    async function validateRegisterForm() {
      let isValid = true;
      
      // 重置所有提示
      registerRoleError.style.display = 'none';
      registerUsernameError.style.display = 'none';
      registerNameError.style.display = 'none';
      registerPasswordError.style.display = 'none';
      registerConfirmError.style.display = 'none';
      registerSuccess.style.display = 'none';
      registerError.style.display = 'none';

      // 验证身份
      if (!registerRole.value) {
        registerRoleError.style.display = 'block';
        isValid = false;
      }

      // 验证账号
      if (!registerUsername.value.trim()) {
        registerUsernameError.style.display = 'block';
        isValid = false;
      } else {
        // 账号格式校验（邮箱或电话号码）
        // 【修改】新增：根据输入内容判断是邮箱还是电话号码，并进行相应格式校验
        // 账号包含"@"符号，判断为邮箱，否则判断为电话号码 
        if (registerUsername.value.includes("@")) {
           //判断为邮箱，检查是否合规
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailPattern.test(registerUsername.value.trim())) {
          registerUsernameError.textContent = '请输入有效的邮箱地址';
          registerUsernameError.style.display = 'block';
          isValid = false;
      }else {
          registerEmail = registerUsername.value.trim();
          registerAccount = registerEmail;
          registerPhone = "";
        }
    }else{
        registerEmail="";
        const phonePattern = /^[\d-]{1,30}$/;
        if (!phonePattern.test(registerUsername.value.trim())) {
          registerUsernameError.textContent = '请输入有效的电话号码（最多30位，仅限数字和“-”分隔符）';
          registerUsernameError.style.display = 'block';
          isValid = false;
        } else {
          registerPhone = registerUsername.value.trim();
          registerAccount = registerPhone;
        }
      }
      if(isValid)
       { // 检查账号是否已存在  
        const isExist = await checkAccountExists(registerAccount); 
        if (isExist) { 
          isValid = false; 
          registerUsernameError.textContent = '账号已存在';
          registerUsernameError.style.display = 'block';
        }
      }
    } 

      // 验证真实姓名
      if (!registerName.value.trim()) {
        registerNameError.style.display = 'block';
        isValid = false;
      }
            

      // 验证密码
      if (!registerPassword.value.trim()) {
        registerPasswordError.style.display = 'block';
        isValid = false;
      }

      // 验证确认密码
      if (registerConfirmPwd.value.trim() !== registerPassword.value.trim()) {
        registerConfirmError.style.display = 'block';
        isValid = false;
      }

      return isValid;
    }
   
   // 利用后端 "/account/exist" 检查账号是否已经存在
   // 该函数会对输入账号发起GET请求，返回Promise<boolean>
   async function checkAccountExists(registerAccount) {
     if (!registerAccount) return false; // 没有账号直接认为不存在（交给前面表单校验）
     try { 
       const resp = await fetch(`${API_BASE_URL}/user/account/exist?account=${encodeURIComponent(registerAccount)}`);
       if (!resp.ok) {
         // 网络异常一律视为未占用，但需给出alert以便排查问题
          alert("网络异常，无法校验账号是否存在,稍等再试"); //可根据需要屏蔽
         return false;
       }
       const data = await resp.json();
       // 期望后端返回 { code: ..., data: true/false }
       return !!(data && data.data === true);
     } catch (e) {
       // 网络或js异常视为未占用
        alert("连接后端失败，无法判断账号是否已存在,稍等再试");
       return false;
     } 
   }
   
    // 新增：提交注册申请
    function submitRegister() {
      // 模拟提交到后端（实际项目用fetch/post）
      return new Promise((resolve) => {
        setTimeout(() => {
          // 构造注册信息
          const registerInfo = {
             role: registerRole.value,
             account:registerAccount,
             email: registerEmail,
             phone: registerPhone,

            name: registerName.value.trim(),
            password: registerPassword.value.trim(),
            status: 'pendding' // 待审核状态
          };
          
          // 存储到本地,只保存最近1个记录（模拟后端暂存）
          let pendingRegisters =JSON.parse('[]');// JSON.parse(localStorage.getItem('pendingRegisters') || '[]');
          pendingRegisters.push(registerInfo);
          localStorage.setItem('pendingRegisters', JSON.stringify(pendingRegisters));
          
          // 【修改】移除URL变量前多余空格 + 优化为模板字符串
          const URL = `${API_BASE_URL}/user/${registerInfo.role}/register`;
          
          /*
            本段处理逻辑解析：

            1. 使用 fetch 向后端接口 URL 提交注册信息(registerInfo)，方法为 POST，数据格式为 JSON。
            2. headers 里包含 'Content-Type: application/json' 以表明数据格式。credentials 字段写入 header 实际无效（credentials 应为 fetch 第二参数顶层）。
            3. 发起请求后，处理返回响应：
              a) 首先检查 response.ok（是否HTTP 200系列）。如果不是，则抛出异常进入catch分支。
              b) 如正常，则解析返回体为 JSON。
            4. 获取返回数据 data 后，根据 data.status 业务字段进行分支判断：
              - 若 status 为 'duplicate'，提示账号已存在。
              - 若 status 为 'success'，显示注册成功的提示，并延迟2秒关闭注册弹窗且重置表单。
              - 其它情况，弹窗提示注册失败。
            5. 若抓到异常（如网络错误或HTTP异常），提示用户“网络异常，请检查后重试”。
            6. 控制台分别打印 response 和 data 便于调试。
            整体逻辑实现了前端的注册异步请求、异常处理与用户交互提示。
          */
          fetch(URL, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json' ,
              'credentials': 'include'
            },
            body: JSON.stringify(registerInfo)
          })
          .then(response => {             
            console.log('注册result:', response);
            
            return response.json();
          })
          .then(data => { 
           console.log('data:', data);
            if (data && data.code === 400) {
              //alert('该账号已存在，请更换账号或登录该账号');
               registerError.style.display ='block';
               registerError.textContent = '该账号已存在，请更换账号或登录该账号';
            }else if (data && data.code === 200) {  
              registerSuccess.style.display = 'block';
              registerSuccess.textContent = data.message; //在注册页面显示data.message
              localStorage.setItem('currentUser', JSON.stringify(data.data));//保存用户信息到本地,userId,role,token
              // 保存localStorage的currentUser到cookie（简单实现，2小时有效期）
              try {
                const userStr = localStorage.getItem('currentUser');
                if (userStr) {
                  // 设置cookie名为currentUser，值为encodeURIComponent后的userStr，过期2小时
                  const d = new Date();
                  d.setTime(d.getTime() + (2*60*60*1000));  // 2小时
                  document.cookie = `currentUser=${encodeURIComponent(userStr)};expires=${d.toUTCString()};path=/`;
                }
              } catch(e) {
                console.error("写入cookie失败", e);
              }
              setTimeout(() => {
                registerModal.style.display = 'none';  
                resetRegisterForm();
                //返回登录页面
               window.location.href = './index.html';
              }, 2000);
            } else {
              alert(data.message);
            }
          })
          .catch(error => {
            // 错误处理
            console.error('注册请求出错:', error);
            alert('网络异常，请检查后重试');
          });
          
          resolve();
        }, 800);
      });
    }

    // 用户认证函数（登录）
    function authenticateUser(  uname, pwd) {
        const loginInfo = {
             account:uname,
             password: pwd
          };

     // console.log("body:",JSON.stringify(registerInfo));
      const URL = `${API_BASE_URL}/user/login`;
      fetch(URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json' ,
          'credentials': 'include'
        },
        body: JSON.stringify(loginInfo)
      })
      .then(response =>response.json()  )
      .then(data => {
        console.log('post ret data:', data  );
        if (data && data.code >= 500) {
          showApiError(data.message || '服务器异常' );
        }   if (data && ( data.code >= 400)) {
         // alert('账号或密码错误，请重试');抛出异常 
           loginError.style.display = 'block';
           loginError.textContent = '账号或密码错误，请重试';
           loginBtn.disabled = false;
           btnText.innerHTML = '登录系统';
        }else if (data && data.code === 200) {
            // TBD:data.message
             console.log('login  ret data、currentUser:', data.data);
             localStorage.setItem('currentUser', JSON.stringify(data.data));//保存用户信息到本地,userId,role,token
             loginError.style.display = 'block';
             loginError.style.color = 'green';
             loginError.textContent = data.message; 

             try {
                const userStr = localStorage.getItem('currentUser');
                if (userStr) {
                  // 设置cookie名为currentUser，值为encodeURIComponent后的userStr，过期2小时
                  const d = new Date();
                  d.setTime(d.getTime() + (20*60*60*1000));  // 2小时
                  document.cookie = `currentUser=${encodeURIComponent(userStr)};expires=${d.toUTCString()};path=/`;
                }
              } catch(e) {
                console.error("写入cookie失败", e);
              }
              
              setTimeout(() => {
                loginError.style.display = 'none';
                loginError.style.color = 'red';
                // 认证成功，跳转对应页面
                redirectToUserPage(data.data);
              }, 2000);
            }
          })
          .catch(error => {
            console.error('登录请求出错:', error);
            //alert('网络异常，请检查后重试');
            showApiError('网络或异常，请检查后重试'+error );
          });
        }

    // 页面跳转函数（根据用户角色）
    function redirectToUserPage(user) {
       
      //alert('redirectToUserPage:'+ user.role );
      // 存储用户信息到本地（实际项目中使用token）
     // localStorage.setItem('currentUser', JSON.stringify(user));
      
      // 根据角色跳转对应页面
      switch(user.role) {
        case 'admin':
          window.location.href = '/admin.html'; // 管理端页面
          break;
        case 'teacher':
          window.location.href = '/teacher.html'; // 教师端页面
          break;
        case 'student':
          window.location.href = '/student.html'; // 学生端页面
          break;
        default:
          alert('未知用户身份，请联系管理员');
          resetLoginForm();
      }
    }

    // 重置登录表单
    function resetLoginForm() {
      loginForm.reset();
      loginBtn.disabled = false;
      btnText.innerHTML = '登录系统';
    }

    // 新增：重置注册表单
    function resetRegisterForm() {
      registerForm.reset();
      registerBtn.disabled = false;
      registerSuccess.style.display = 'none';
      registerError.style.display = 'none';
    }

    
    // 登录表单提交事件
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault(); // 阻止表单默认提交

      // 表单验证
      if (!validateForm()) {
        return;
      }

      // 显示加载状态
      loginBtn.disabled = true;
      btnText.innerHTML = '<span class="loading"></span> 登录中...';

      try {
        console.log('login input:',username.value.trim(), password.value.trim());
        // 用户认证
        const user = await authenticateUser(
          username.value.trim(),
          password.value.trim()
        );

      } catch (error) {
        // 认证失败，显示错误提示
        loginError.style.display = 'block';
        loginError.textContent = error;
        
        // 恢复按钮状态
        loginBtn.disabled = false;
        btnText.innerHTML = '登录系统';
        
        // 清空密码框
        password.value = '';
      }
    });

    // 新增：注册弹窗显示/隐藏
    showRegister.addEventListener('click', () => {
      registerModal.style.display = 'flex';
    });

    closeModal.addEventListener('click', () => {
      registerModal.style.display = 'none';

在使用 fetch 进行自动登录（如刷新页面后检查 localStorage/cookie 自动登录）时出现 403 错误，原因可能有：

1. **会话凭证丢失**：后端通常通过 Cookie（如 JSESSIONID、token 等）验证登录态。刷新页面时，如果前端未携带或丢失这些凭证（如本地未种 cookie，或 fetch 没加 credentials 配置），后端会拒绝请求返回 403。

2. **跨域未携带认证信息**：fetch 请求如果未设置 `credentials: 'include'`，跨域情况下不会自动携带 cookie，导致登录态失效。

3. **token 已过期或状态与后端不一致**：localStorage 的用户信息只是前端存储，若 session 已失效、token 过期、cookie 被手动清理，前端以为有“已登录”信息但后端拒绝认证，请求接口就会 403。

4. **CSRF 校验失败**：有些后端对 POST/登录敏感接口做了 CSRF 校验，header/token 不对时也会 403。

**排查与修复建议：**
- 检查 fetch 是否正确带上了 Cookie（如需要跨域，必须加 `credentials: 'include'`）。
- 检查 localStorage 或 cookie 的登录态是否和服务端保持一致。
- 手动清除 localStorage 及 cookie，重新登录一次，观察是否能恢复正常。
- 检查后端日志确认 403 详细原因。

【fetch 的使用方法说明】

1. fetch 是原生 JavaScript 用于发起 HTTP 请求获取数据的函数。其基本用法如下：

fetch(请求地址, 配置项)
  .then(response => response.json()) // 解析响应体为 JSON
  .then(data => {
    // 对 data 进行处理（data 是 JSON 解析出来的 JS 对象）
  })
  .catch(error => {
    // 处理网络异常等错误
  });

2. 参数和链式调用说明：
- 第一个参数：字符串类型，接口地址（如 '/api/v1/user/login'）。
- 配置项通常为对象，定义 method、headers、body 等（如 POST 请求时要加上 body 和 Content-Type）。

示例（以 POST 登录为例）：
fetch('/api/v1/user/login', {
  method: 'POST',
  headers: {'Content-Type': 'application/json'},
  body: JSON.stringify({account: 'abc', password: '123456'})
})
  .then(response => response.json()) // 将 Response 对象解析为 JS 对象
  .then(data => {
    // data 是后端返回的JSON对象，比如: {code: 0, msg: "成功", data: {...}}
    if (data.code === 0) {
      // 登录成功处理
    } else {
      // 登录失败逻辑
    }
  })
  .catch(err => {
    // 网络或接口异常处理
    alert('请求失败: ' + err);
  });

3. 链式 then 的顺序：
- 第一个 then 得到 Response 对象，用 response.json() 转成 JS 对象，返回 Promise。
- 第二个 then 的 data 参数就是已经解析好的 JS 数据对象。
- catch 用于捕获整个 Promise 链中的异常。

【注意点】
- fetch 只会 reject 网络级错误，对于 HTTP 状态码错误（比如 400、500 等）不会自动抛异常，需要在 then(response => ...) 里判断 response.ok 决定是否解析 response.json()。

fetch 的 then 用法以及两个 then 的先后关系说明：

1. then 的链式调用解析

fetch("接口地址")
  .then(response => response.json())
  .then(data => {
    // 这里处理 JSON 数据
    console.log(data);
  });

- 第一个 then（response => response.json()）的作用是将 fetch 返回的 Response 对象解析为 JSON 数据。即第一个 then 的返回值是一个 Promise，表示解析 JSON 的过程。
- 第二个 then（data => ...）是在第一个 then 完成并把 JSON 数据返回后接着执行的。此时 data 参数就是解析出来的 JS 对象。

2. 两个 then 的先后关系

- 它们是**顺序执行**的：第二个 then 必须等第一个 then 完成（即 response.json() 解析成功，并且返回了解析后的数据）之后，才会执行。
- 换句话说，第一个 then 的返回值会作为第二个 then 的输入参数。

3. 举例说明
fetch('/api/v1/user/login', {...})
  .then(response => response.json()) // 这一步把 Response 变成 JS 对象

    // 只有等上一步成功解析了 JSON，这步才会运行
    if (data.code === 0) {
      // 成功逻辑
    } else {
      // 失败逻辑
    }
  });

因此：**then 是链式、顺序执行的，后一个 then 只有在前一个 then 成功完成后才会执行。**

setTimeout 用于设置一个延时任务，即让某一段代码在指定的等待时间（毫秒）之后再执行一次。

**用法示例：**
setTimeout(function() {
  // 这里写要延迟执行的代码
}, 2000); // 2000毫秒后执行（也就是2秒）

**参数说明：**
- 第一个参数：函数或字符串（推荐函数），代表到时要执行的代码。
- 第二个参数：延时的毫秒数（1秒=1000毫秒）。

**常见用途：**
- 页面动画的延后展示、弹窗的自动关闭，如：
  setTimeout(() => {
    modal.style.display = 'none';
  }, 1500);

- 表单提交成功后，延迟2秒跳转到首页
  setTimeout(() => {
    window.location.href = '/';
  }, 2000);

**注意点：**
- setTimeout 只会执行一次。如果想多次定时，请用 setInterval。
- 可以用 clearTimeout(timerId) 取消还未到时的定时任务。

**实际案例：**
展示“注册成功”2秒再关闭弹窗：

setTimeout(() => {
  registerModal.style.display = 'none';
