<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>语言教学预约系统 - 教师端</title>
  <!-- 引入教师端全局样式   -->
  <link rel="stylesheet" href="/css/teacher.css">

  <!-- 引入图标库 -->
  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* 新增头部样式，确保布局正常 */
   
  </style>
</head>
<body>
  <!-- 头部区域 -->
  <header class="header">
    <div class="logo">
      <img src="https://via.placeholder.com/40x40/52c41a/ffffff?text=教" alt="教师端logo">
      <span class="logo-text">语言教学预约系统（教师端）</span>
    </div>
    <div class="header-actions">
      <div class="user-info">
        <div class="avatar">李</div>
        <span class="user-name">李老师</span>
      </div>
      <button class="btn btn-default" style="padding: 6px 12px;" onclick="logout()">
        <i class="fa fa-sign-out-alt"></i> 退出
      </button>
    </div>
  </header>

  <!-- 布局容器 -->
  <div class="layout-container">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="menu-group-title">我的工作台</div>
      
      <div class="menu-item">
        <i class="fa fa-book"></i>
        <span>我的课程</span>
      </div>
      <div class="menu-item">
        <i class="fa fa-calendar"></i>
        <span>预约管理</span>
      </div>
      <div class="menu-item">
        <i class="fa fa-star"></i>
        <span>学生评价</span>
      </div>
      <div class="menu-item">
        <i class="fa fa-user"></i>
        <span>个人中心</span>
      </div>
    </aside>

    <!-- 主内容区域 -->
    <div class="content-wrapper">
      <div class="content-header">
        <h1 class="page-title">我的工作台</h1>
      </div>
      
      <!-- 动态内容中央区域（核心修改：独立容器+居中样式） -->
      <div id="dynamic-content-center" class="dynamic-content-center">
        <!-- 初始加载我的工作台内容 -->
      </div>
    </div>
  </div>

  <!-- JavaScript交互逻辑 -->
  <script>
    // 侧边栏菜单切换逻辑
    const menuItems = document.querySelectorAll('.menu-item');
    const pageTitle = document.querySelector('.page-title');
    const dynamicContent = document.getElementById('dynamic-content-center'); // 指向正确的容器
    
    menuItems.forEach(item => {
      item.addEventListener('click', function() {
        // 移除所有激活状态
        menuItems.forEach(menu => menu.classList.remove('active'));
        // 为当前点击项添加激活状态
        this.classList.add('active');
        // 更新页面标题
        const titleText = this.querySelector('span').textContent;
        pageTitle.textContent = titleText;
        
        // 加载对应页面内容
        loadTeacherPageContent(titleText);
      });
    });

    // 教师端页面内容加载逻辑（核心修复：指向正确的动态容器）
    function loadTeacherPageContent(title) {
      // 清空原有内容
      dynamicContent.innerHTML = '';
      
      switch(title) {
        case '我的工作台':
          dynamicContent.innerHTML = `
            <!-- 今日预约卡片 -->
            <div class="card">
              <h3><i class="fa fa-calendar-check-o"></i> 今日预约 _TBD</h3>
              <div id="today-reservations">
                <div class="course-card">
                  <div class="course-info">
                    <h4>英语初级口语 - 小班课</h4>
                    <p>预约人：张三 | 时间：14:00-15:00 | 状态：待确认</p>
                  </div>
                  <div class="course-actions">
                    <button class="btn btn-primary" onclick="confirmReservation(this)">确认预约</button>
                    <button class="btn btn-gray" onclick="rejectReservation(this)">拒绝</button>
                  </div>
                </div>
                <div class="course-card">
                  <div class="course-info">
                    <h4>英语进阶写作</h4>
                    <p>预约人：李四 | 时间：16:00-17:00 | 状态：已确认</p>
                  </div>
                  <div class="course-actions">
                    <button class="btn btn-gray" onclick="viewDetail(this)">查看详情</button>
                  </div>
                </div>
              </div>
            </div>
            <!-- 课程统计卡片 -->
            <div class="card">
              <h3><i class="fa fa-bar-chart"></i> 本月课程统计</h3>
              <div style="display: flex; gap: 20px; margin-top: 15px; padding: 0 20px;">
                <div style="flex: 1; text-align: center;">
                  <p style="font-size: 24px; font-weight: 600; color: var(--primary-color);">12</p>
                  <p style="color: var(--text-light-color);">已完成课程</p>
                </div>
                <div style="flex: 1; text-align: center;">
                  <p style="font-size: 24px; font-weight: 600; color: #fa8c16;">8</p>
                  <p style="color: var(--text-light-color);">待上课程</p>
                </div>
                <div style="flex: 1; text-align: center;">
                  <p style="font-size: 24px; font-weight: 600; color: #f5222d;">2</p>
                  <p style="color: var(--text-light-color);">取消课程</p>
                </div>
              </div>
            </div>
            <!-- 待办事项卡片 -->
            <div class="card">
              <h3><i class="fa fa-tasks"></i> 待办事项</h3>
              <ul style="margin-top: 15px; padding-left: 40px; padding-bottom: 20px;">
                <li style="margin-bottom: 8px; font-size: 14px;">批改张三的口语作业</li>
                <li style="margin-bottom: 8px; font-size: 14px;">更新英语进阶写作课程大纲</li>
                <li style="margin-bottom: 8px; font-size: 14px;">回复学生课程咨询（3条未读）</li>
              </ul>
            </div>
          `;
          break;
        case '我的课程':
          dynamicContent.innerHTML = `
            <div class="card">
              <h3 style="padding: 16px 20px; margin: 0; border-bottom: 1px solid var(--border-color);">课程列表</h3>
              <div style="margin-top: 15px; padding: 0 20px 20px;">
                <div class="course-card">
                  <div class="course-info">
                    <h4>英语初级口语 - 小班课</h4>
                    <p>难度：初级 | 课时：45分钟/节 | 价格：80元/节</p>
                  </div>
                  <div class="course-actions">
                    <button class="btn btn-primary">编辑课程</button>
                    <button class="btn btn-gray">查看排期</button>
                  </div>
                </div>
                <div class="course-card">
                  <div class="course-info">
                    <h4>英语进阶写作</h4>
                    <p>难度：进阶 | 课时：60分钟/节 | 价格：100元/节</p>
                  </div>
                  <div class="course-actions">
                    <button class="btn btn-primary">编辑课程</button>
                    <button class="btn btn-gray">查看排期</button>
                  </div>
                </div>
                <button class="btn btn-primary" style="margin-top: 15px;">新增课程</button>
              </div>
            </div>
          `;
          break;
        case '预约管理':
                   // 操作按钮事件 --checkout----set online =false TBD 
          if (window.loadAdminPageContent) {
                        // 覆盖 "教师管理" 渲染逻辑
                        loadAdminPageContent = (function(orig){
                          return function(title) {
                            if(title === '预约管理'){
                              renderTeacherAppointmentBrowserCards();
                            } else {
                              orig(title);
                            }
                          }
                        })(loadAdminPageContent);
                      } else {
                        // 兼容性 fallback: 尝试直接渲染（首次页面加载时）
                        renderTeacherAppointmentBrowserCards();
                      }  
       
          break;
        case '学生评价':
          dynamicContent.innerHTML = `
            <div class="card">
              <h3 style="padding: 16px 20px; margin: 0; border-bottom: 1px solid var(--border-color);">最新评价</h3>
              <div style="margin-top: 15px; padding: 0 20px 20px;">
                <div style="padding: 15px; border-bottom: 1px solid var(--border-color);">
                  <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <span style="font-weight: 600;">张三</span>
                    <span style="color: #fa8c16;">★★★★★</span>
                  </div>
                  <p style="font-size: 14px; color: var(--text-color);">李老师讲课非常细致，口语发音纠正很到位，收获很大！</p>
                  <p style="font-size: 12px; color: var(--text-light-color); margin-top: 8px;">2026-03-18</p>
                </div>
                <div style="padding: 15px; border-bottom: 1px solid var(--border-color);">
                  <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <span style="font-weight: 600;">李四</span>
                    <span style="color: #fa8c16;">★★★★☆</span>
                  </div>
                  <p style="font-size: 14px; color: var(--text-color);">写作技巧讲解很实用，希望能多增加一些范文分析。</p>
                  <p style="font-size: 12px; color: var(--text-light-color); margin-top: 8px;">2026-03-15</p>
                </div>
              </div>
            </div>
          `;
          break;
        case '个人中心':
          dynamicContent.innerHTML = `
            <div class="card">
              <h3 style="padding: 16px 20px; margin: 0; border-bottom: 1px solid var(--border-color);">个人信息</h3>
              <div style="margin-top: 15px; padding: 0 20px 20px; display: flex; gap: 20px;">
                <div style="width: 80px; height: 80px; border-radius: 50%; background-color: var(--primary-color); color: #fff; text-align: center; line-height: 80px; font-size: 32px;">李</div>
                <div style="flex: 1;">
                  <div style="margin-bottom: 10px;">
                    <span style="color: var(--text-light-color); width: 80px; display: inline-block;">姓名：</span>
                    <span>李华</span>
                  </div>
                  <div style="margin-bottom: 10px;">
                    <span style="color: var(--text-light-color); width: 80px; display: inline-block;">教龄：</span>
                    <span>5年</span>
                  </div>
                  <div style="margin-bottom: 10px;">
                    <span style="color: var(--text-light-color); width: 80px; display: inline-block;">擅长：</span>
                    <span>英语口语、写作</span>
                  </div>
                  <div style="margin-bottom: 10px;">
                    <span style="color: var(--text-light-color); width: 80px; display: inline-block;">评分：</span>
                    <span style="color: #fa8c16;">4.9分</span>
                  </div>
                  <button class="btn btn-primary" style="margin-top: 10px;">编辑信息</button>
                </div>
              </div>
            </div>
            <div class="card">
              <h3 style="padding: 16px 20px; margin: 0; border-bottom: 1px solid var(--border-color);">账号设置</h3>
              <div style="margin-top: 15px; padding: 0 20px 20px;">
                <div style="margin-bottom: 15px;">
                  <button class="btn btn-gray" style="width: 100%; text-align: left; padding: 10px 15px;">
                    <i class="fa fa-lock"></i> 修改密码
                  </button>
                </div>
                <div>
                  <button class="btn btn-gray" style="width: 100%; text-align: left; padding: 10px 15px;">
                    <i class="fa fa-bell"></i> 消息通知设置
                  </button>
                </div>
              </div>
            </div>
          `;
          break;
      }
    }

    // 预约操作函数
    function confirmReservation(el) {
      const courseCard = el.closest('.course-card');
      const statusText = courseCard.querySelector('.course-info p');
      statusText.innerHTML = statusText.innerHTML.replace('待确认', '已确认');
      el.textContent = '已确认';
      el.disabled = true;
      el.nextElementSibling.disabled = true;
      alert('预约确认成功！');
    }

    function rejectReservation(el) {
      if (confirm('确定要拒绝该预约吗？')) {
        const courseCard = el.closest('.course-card');
        const statusText = courseCard.querySelector('.course-info p');
        statusText.innerHTML = statusText.innerHTML.replace('待确认', '已拒绝');
        el.previousElementSibling.disabled = true;
        el.textContent = '已拒绝';
        el.disabled = true;
        alert('预约已拒绝！');
      }
    }

    function viewDetail(el) {
      alert('查看课程详情：\n课程名称：英语进阶写作\n预约人：李四\n时间：16:00-17:00\n备注：无特殊要求');
    }

    // 退出函数（补充缺失的logout）
     // 退出登录函数
     function logout() {
      if (confirm('确定要退出系统吗？')) {
        // 清除本地存储的用户信息
        localStorage.removeItem('currentUser');
        // 跳回登录页（这里注释掉，方便测试）
         window.location.href = 'index.html';
       // alert('已退出登录！');
      }
    }


    // 页面初始化：加载默认的"我的工作台"内容
    window.onload = function() {
      console.log('教师端页面加载完成');
      loadTeacherPageContent('预约管理');

      const nameid=document.getElementById("user-name");
       if(nameid) nameid.innerHTML= userInfo.name;
       
       // 设置头像元素为用户名首字母
       const avatarElem = document.getElementById("avatar");
       if (avatarElem && userInfo && userInfo.name && userInfo.name.length > 0) {
         avatarElem.textContent = userInfo.name.charAt(0);
       }

      // 可在此处对接API加载真实数据
      // fetch('/api/teacher/home').then(res => res.json()).then(data => {
      //   // 渲染真实的预约、统计数据
      // });   
    };

  </script>
   <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
   <script src="js/public/api.js"></script> 
   <script src="js/public/dataFunctions.js"></script> 
   <script src="js/public/courseAndBooking.js"></script>     
   <script src="js/teacher-course-appointment.js"></script>
   <script> 
      console.log("end of body...")
   </script>
</body>
</html>
