server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/lesson_appointment?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        connection:
           characterEncoding: utf8 # 此处填 utf8（驱动会自动映射为 utf8mb4）
        dialect: org.hibernate.dialect.MySQL8Dialect
    #database-platform: org.hibernate.dialect.MySQL8Dialect # 适配 MySQL 8.0+


  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

logging:
  level:
    com.lessonappointment: DEBUG
    org.hibernate.SQL: DEBUG
